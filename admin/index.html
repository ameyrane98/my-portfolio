<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Portfolio</title>
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', t || (d ? 'dark' : 'light'));
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
      <div class="login-card">
        <h1 class="login-title">Admin<span class="dot">.</span></h1>
        <p class="login-sub">Portfolio management</p>
        <form id="loginForm">
          <div class="field">
            <input
              type="password"
              id="passwordInput"
              placeholder="Password"
              autocomplete="current-password"
              required
            />
          </div>
          <p id="loginError" class="error-msg" hidden>Incorrect password.</p>
          <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
        </form>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="screen" hidden>
      <header class="dash-header">
        <span class="dash-logo">Admin<span class="dot">.</span></span>
        <div class="dash-header-actions">
          <a href="/" class="btn btn-ghost">← Portfolio</a>
          <button id="logoutBtn" class="btn btn-ghost">Sign Out</button>
        </div>
      </header>

      <main class="dash-main">
        <!-- Profile Picture -->
        <section class="dash-card">
          <h2 class="card-title">Profile Picture</h2>
          <div class="profile-row">
            <img id="profilePreview" src="../static/profile.jpg" alt="Profile" class="profile-thumb" />
            <div class="upload-area" id="profileDropZone">
              <input type="file" id="profileFile" accept="image/*" hidden />
              <p>Drop an image here or <button class="link-btn" id="profilePickBtn">browse</button></p>
              <p class="upload-hint">JPG, PNG, WebP — shown as circular photo</p>
            </div>
          </div>
          <div id="profileStatus" class="status-msg" hidden></div>
        </section>

        <!-- Resume -->
        <section class="dash-card">
          <h2 class="card-title">Resume</h2>
          <div class="resume-row">
            <div id="resumeCurrent" class="resume-current">
              Current: <a id="resumeLink" href="../static/resume.pdf" target="_blank">resume.pdf</a>
            </div>
            <div class="upload-area" id="resumeDropZone">
              <input type="file" id="resumeFile" accept=".pdf" hidden />
              <p>Drop a PDF here or <button class="link-btn" id="resumePickBtn">browse</button></p>
              <p class="upload-hint">PDF only</p>
            </div>
          </div>
          <div id="resumeStatus" class="status-msg" hidden></div>
        </section>

        <!-- Projects -->
        <section class="dash-card">
          <h2 class="card-title">Projects</h2>
          <p class="card-sub">Toggle which GitHub repos appear on the portfolio.</p>
          <div id="reposLoading" class="loading-text">Loading repositories…</div>
          <ul id="reposList" class="repos-list" hidden></ul>
          <div class="save-row">
            <button id="saveProjectsBtn" class="btn btn-primary">Save Changes</button>
            <span id="projectsStatus" class="status-inline" hidden></span>
          </div>
        </section>
      </main>
    </div>

    <script src="admin.js"></script>
  </body>
</html>
